      /* Critical hero section styles */

      /* Optimize CLS for images */

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" defer></script>
    
    <!-- Optimized YouTube API loading strategy -->
    <script>
      // Intersection Observer to detect when videos are in view
      document.addEventListener('DOMContentLoaded', () => {
        let ytApiLoaded = false;
        
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            // Only load YouTube API when a video element is near the viewport
            if (entry.isIntersecting && !ytApiLoaded) {
              window.onYouTubeLoad();
            }
          });
        }, {
          rootMargin: '200px', // Load when within 200px of viewport
          threshold: 0.1
        });
        
        // Observe all potential video elements
        document.querySelectorAll('.video-container').forEach(el => {
          observer.observe(el);
        });
        
        // Load YouTube API only when needed
        window.onYouTubeLoad = () => {
          if (!ytApiLoaded) {
            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            ytApiLoaded = true;
          }
        };
      });
    </script>
  </body>
